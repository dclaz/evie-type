<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Typing Fun</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="confetti"></canvas>

  <div id="flash" aria-hidden="true"></div>

  <main id="game" class="hidden">
    <div id="fonts">
      <button type="button" class="font-btn is-on" data-font="poppins">Poppins</button>
      <button type="button" class="font-btn" data-font="edu">Edu VIC WA NT Beginner</button>
      <button type="button" class="font-btn" data-font="literata">Literata</button>
    </div>

    <div id="stats">
      <div id="stat-keys">0/0 correct keys (0%)</div>
      <div id="stat-ckpm">0 correct keys/min</div>
      <div id="stat-words">Number of words: 0</div>
    </div>

    <div id="picture">🐱</div>
    <div id="word"></div>
    <div id="keyboard"></div>
  </main>

  <div id="start">
    <button id="start-btn" type="button" aria-label="Start">
      <span id="start-icon">⌨️</span>
    </button>
    <p id="start-label" aria-hidden="true">Click to begin</p>
  </div>

  <div id="version" aria-hidden="true">v0.1.0</div>

<script src="words.js"></script>
<script src="game.js"></script>
</body>
</html>
